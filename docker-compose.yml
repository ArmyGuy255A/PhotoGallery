version: '3.8'

services:
  # PostgreSQL for Keycloak
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak-password
      POSTGRES_DB: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak for OpenID Connect (development auth provider)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak-password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin-password
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
    command:
      - "start-dev"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage (development)
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin-password
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PhotoGallery Backend (ASP.NET)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5105
      ASPNETCORE_HTTPS_PORTS: 7105
      ConnectionStrings__DefaultConnection: "Data Source=app.db"
      Storage__Provider: "Minio"
      Storage__Minio__Endpoint: "minio:9000"
      Storage__Minio__AccessKey: "minioadmin"
      Storage__Minio__SecretKey: "minioadmin-password"
      Storage__Minio__BucketName: "photogallery"
      DISABLE_AUTH: "true"
    ports:
      - "5105:5105"
      - "7105:7105"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./PhotoGallery:/app
    working_dir: /app

  # PhotoGallery Frontend (Angular)
  frontend:
    build:
      context: ./FE.PhotoGallery
      dockerfile: Dockerfile
    environment:
      API_URL: "http://localhost:5105"
    ports:
      - "4200:4200"
    depends_on:
      - backend
    volumes:
      - ./FE.PhotoGallery:/app

volumes:
  postgres_data:
  minio_data:

networks:
  default:
    name: photogallery-network
