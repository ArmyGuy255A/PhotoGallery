version: '3.8'

services:
  # MS SQL Server 2022 (Linux container, runs natively on WSL2 / Linux Docker).
  # Production runs Azure SQL Server, so this gives true dev/prod parity for
  # the data layer — same provider, same migration set, same transactional
  # semantics. Required: there is no Sqlite or InMemory runtime path.
  #
  # Bring up before the API:
  #   docker compose up -d mssql
  # First start takes ~10s to initialize. Healthcheck waits for sqlcmd to
  # answer; depends_on: condition: service_healthy is sufficient.
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      # Developer edition is free, has full feature parity with Enterprise
      # for non-production use, and matches what Azure SQL Server runs.
      MSSQL_PID: "Developer"
      # The 'sa' password must satisfy SQL Server's complexity policy
      # (8+ chars, 3 of {upper, lower, digit, symbol}). This is a local-only
      # dev credential — never replicated to Trial/Prod (those use Azure SQL
      # with Workload Identity, no sa password at all).
      MSSQL_SA_PASSWORD: "PhotoGallery!Dev123"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      # /opt/mssql-tools18/bin/sqlcmd is the SQL Server 2022 image's bundled
      # client. -C trusts the self-signed cert; -Q runs the no-op query.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'PhotoGallery!Dev123' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # PostgreSQL for Keycloak
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak-password
      POSTGRES_DB: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak for OpenID Connect (development auth provider)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak-password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin-password
      KC_PROXY: edge
      KC_HTTP_ENABLED: true
    command:
      - "start-dev"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible object storage (development)
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin-password
    command: minio server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PhotoGallery Backend (ASP.NET) — opt-in via 'full-container' profile.
  # For dev, run the backend with `dotnet watch run` instead (faster iteration,
  # hot-reload on save). This service is only here for full-container demos /
  # CI smoke tests. Bring it up explicitly with:
  #   docker-compose --profile full-container up -d
  backend:
    profiles: ["full-container"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5105
      ASPNETCORE_HTTPS_PORTS: 7105
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=PhotoGalleryDev;User Id=sa;Password=PhotoGallery!Dev123;TrustServerCertificate=true;MultipleActiveResultSets=true"
      Storage__Provider: "Minio"
      Storage__Minio__Endpoint: "minio:9000"
      Storage__Minio__AccessKey: "minioadmin"
      Storage__Minio__SecretKey: "minioadmin-password"
      Storage__Minio__BucketName: "photogallery"
      DISABLE_AUTH: "true"
    ports:
      - "5105:5105"
      - "7105:7105"
    depends_on:
      mssql:
        condition: service_healthy
      minio:
        condition: service_healthy

  # PhotoGallery Frontend (Angular) — opt-in via 'full-container' profile.
  # For dev, run with `ng serve` instead.
  frontend:
    profiles: ["full-container"]
    build:
      context: ./FE.PhotoGallery
      dockerfile: Dockerfile
    environment:
      API_URL: "http://localhost:5105"
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  mssql_data:

networks:
  default:
    name: photogallery-network
