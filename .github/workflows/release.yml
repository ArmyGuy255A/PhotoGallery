name: Release Deploy

# Fires when a GitHub Release is published (typically by cut-release.yml on
# trial → main merges; manual `gh release create` also works for hotfixes).
# Builds + publishes ACR images tagged with the release version, then rolls
# the ACA backend revision and deploys the Angular SPA to Azure Static Web
# Apps. The release.tag_name (e.g. v1.0.0.0) is the immutable anchor for all
# downstream artefacts.
#
# See DESIGN_DECISIONS.md D016 (release-driven deployment) for rationale.
on:
  release:
    types: [published]
  # Manual escape hatch for re-running a deploy against an existing release
  # tag (e.g. ACA fell over and needs the image re-pushed). cut-release.yml
  # now uses `gh workflow run` with `actions: write` to dispatch this
  # workflow directly on every merge to main, so the auto path is reliable.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (e.g. v1.0.0.0). Defaults to the latest published release.'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

# Opt every JS action into Node 24 ahead of the June 2026 forced cutover.
# Silences the Node 20 deprecation warning surfaced on every workflow run.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish-images:
    name: Build & push images to ACR
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Resolve release version (strip leading 'v')
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Resolve the tag from the event payload (release: published) or the
          # workflow_dispatch input. If neither, fall back to the latest
          # published release on this repo.
          tag="${{ github.event.release.tag_name }}"
          if [ -z "$tag" ]; then tag="${{ inputs.tag }}"; fi
          if [ -z "$tag" ]; then
            tag=$(gh release view --repo "${{ github.repository }}" --json tagName --jq .tagName)
          fi
          version="${tag#v}"
          echo "Deploying tag=$tag version=$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      # Build from the release tag, not main, so a fast-following push to
      # main can't sneak unrelated commits into the released image.
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      # Three tags per image:
      #   :<version>  → immutable, used by ACA at deploy time and for rollback
      #   :<sha>      → provenance — exactly which commit produced this artifact
      #   :latest     → convenience for humans pulling locally
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-backend:${{ steps.version.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-backend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./FE.PhotoGallery
          file: ./FE.PhotoGallery/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-frontend:${{ steps.version.outputs.version }}
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-frontend:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-frontend:latest

  deploy-backend:
    name: Deploy backend (ACA)
    needs: [publish-images]
    runs-on: ubuntu-latest
    # The github-actions SP holds Contributor on the Container App resource
    # (scoped narrowly via terraform/dev/main.tf); enough to update its image
    # and roll a new revision.
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Pin the version tag (not :latest or <sha>) so each deployed revision
      # is reproducible and `az containerapp update --image ...:vA.B.C.D`
      # against a prior version is a one-liner rollback.
      #
      # Split-topology: the same image powers both the API container app
      # (always-on, min=max=1, full ingress) and the worker container app
      # (no ingress, scales 0→N on queue depth). Both must move forward
      # together — otherwise the API and workers diverge and shared schema
      # / contract assumptions break. ACA_WORKER_NAME is optional so older
      # deployments without the worker app still work; emit a warning and
      # continue instead of failing.
      - name: Update API Container App image
        run: |
          az containerapp update \
            --name "${{ vars.ACA_BACKEND_NAME }}" \
            --resource-group "${{ vars.ACA_RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_LOGIN_SERVER }}/photogallery-backend:${{ needs.publish-images.outputs.version }}"

      - name: Update worker Container App image
        if: vars.ACA_WORKER_NAME != ''
        run: |
          az containerapp update \
            --name "${{ vars.ACA_WORKER_NAME }}" \
            --resource-group "${{ vars.ACA_RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_LOGIN_SERVER }}/photogallery-backend:${{ needs.publish-images.outputs.version }}"

      - name: Skip worker update (not configured)
        if: vars.ACA_WORKER_NAME == ''
        run: echo "::warning::vars.ACA_WORKER_NAME is not set — skipping worker container app update. Set the repo variable to the worker ACA app name once terraform/dev/main.tf module.compute_worker is applied."

      - name: Show active revision
        run: |
          az containerapp revision list \
            --name "${{ vars.ACA_BACKEND_NAME }}" \
            --resource-group "${{ vars.ACA_RESOURCE_GROUP }}" \
            --query "[?properties.active].{name:name, image:properties.template.containers[0].image, traffic:properties.trafficWeight, health:properties.healthState}" \
            --output table

  deploy-frontend:
    name: Deploy frontend (Azure Static Web Apps)
    needs: [publish-images]
    runs-on: ubuntu-latest
    steps:
      # Check out the release tag so the deployed SPA bundle is bound to the
      # exact version named in the release.
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.publish-images.outputs.tag }}
          submodules: false
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE.PhotoGallery/package-lock.json

      - name: Install dependencies
        working-directory: FE.PhotoGallery
        run: npm ci

      - name: Build (production)
        working-directory: FE.PhotoGallery
        # --base-href=/photogallery/ rewrites <base href> in the emitted
        # index.html so Angular routes/assets resolve under the sub-path
        # bound to the appeid.app custom domain.
        run: npm run build -- --configuration=production --base-href=/photogallery/

      # Stage the deploy payload so SWA serves the app at /photogallery/*:
      #   deploy/photogallery/                  <- Angular bundle
      #   deploy/staticwebapp.config.json       <- routes /, fallback to /photogallery/index.html
      # The app_location below points at deploy/ (not the dist/browser folder).
      - name: Stage SWA deploy payload under /photogallery/
        run: |
          set -euo pipefail
          mkdir -p deploy/photogallery
          cp -r FE.PhotoGallery/dist/fe.photo-gallery/browser/. deploy/photogallery/
          cp FE.PhotoGallery/staticwebapp.config.json deploy/staticwebapp.config.json
          # Sanity check.
          test -f deploy/photogallery/index.html
          test -f deploy/staticwebapp.config.json
          ls -la deploy deploy/photogallery | head -50

      # When skip_app_build is true, the SWA action looks for index.html
      # directly under app_location (it does NOT combine app_location +
      # output_location). Point app_location at the staged deploy/ folder,
      # which contains both staticwebapp.config.json (at root) and the
      # Angular bundle under photogallery/.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'deploy'
          output_location: ''
          skip_app_build: true
          skip_api_build: true
