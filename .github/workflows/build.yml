name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend build + tests
    runs-on: ubuntu-latest
    # dorny/test-reporter needs these to write the per-PR check run.
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # Restore the entire solution so cross-cutting sub-projects
      # (Authentication, Configuration) and their NuGet deps come along.
      # See clean-architecture-guide skill — "Cross-Cutting Concerns Live in Sub-Projects".
      - name: Restore
        run: dotnet restore PhotoGallery.sln

      - name: Build (Release, no restore)
        run: dotnet build PhotoGallery.sln --configuration Release --no-restore

      # Run every test project in the solution. Adding a new test project
      # in the future will be picked up automatically.
      # Tests MUST pass — no continue-on-error.
      - name: Test
        run: |
          dotnet test PhotoGallery.sln \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage"

      - name: Upload test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: TestResults/

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Backend test results
          path: TestResults/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Publish (Release artifact)
        run: dotnet publish PhotoGallery/PhotoGallery.csproj -c Release -o ./publish --no-build

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: publish/

  frontend:
    name: Frontend build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'FE.PhotoGallery/package-lock.json'

      - name: Install dependencies
        working-directory: FE.PhotoGallery
        run: npm ci

      - name: Build (production)
        working-directory: FE.PhotoGallery
        run: npm run build

      # Run Karma/Jasmine unit tests headless. Tests MUST pass.
      # ChromeHeadlessCI launcher is configured in karma.conf.js (or use the
      # default ChromeHeadless if not).
      - name: Test
        working-directory: FE.PhotoGallery
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: FE.PhotoGallery/coverage/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: FE.PhotoGallery/dist/

  lint-backend:
    name: Backend warning audit
    runs-on: ubuntu-latest
    # Now that the warning baseline is clean, this is a required check.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore PhotoGallery.sln
      - name: Build with warnings as errors
        run: dotnet build PhotoGallery.sln --no-restore /p:TreatWarningsAsErrors=true

  build-docker:
    name: Docker images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # OIDC token issuance for azure/login@v2 — see DESIGN_DECISIONS.md D015.
    permissions:
      id-token: write
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Workload-Identity-Federation login. AZURE_CLIENT_ID / AZURE_TENANT_ID /
      # AZURE_SUBSCRIPTION_ID are repository variables produced by
      # `terraform output` after the github_oidc module applies.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # `az acr login` exchanges the AAD token for an ACR refresh token and
      # writes it to the local docker config, which docker/build-push-action
      # then picks up. No registry username/password ever materialises.
      - name: ACR login
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      # Build context is the repo root because Dockerfile.backend now copies
      # multiple sub-projects (Authentication/, Configuration/, PhotoGallery/).
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-backend:latest
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-backend:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./FE.PhotoGallery
          file: ./FE.PhotoGallery/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-frontend:latest
            ${{ env.ACR_LOGIN_SERVER }}/photogallery-frontend:${{ github.sha }}

  security-scan:
    name: NuGet vulnerability scan (informational)
    runs-on: ubuntu-latest
    # Informational only — surfaces transitive vulnerabilities without
    # blocking. Promote to required once we have a triage process.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Scan
        run: dotnet list PhotoGallery.sln package --vulnerable --include-transitive

