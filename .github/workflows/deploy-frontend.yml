name: Deploy Frontend (Azure Static Web Apps)

on:
  push:
    branches:
      - main
    paths:
      - 'FE.PhotoGallery/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE.PhotoGallery/package-lock.json

      - name: Install dependencies
        working-directory: FE.PhotoGallery
        run: npm ci

      - name: Build (production)
        working-directory: FE.PhotoGallery
        run: npm run build -- --configuration=production

      # When skip_app_build is true, the SWA action looks for index.html
      # directly under app_location (it does NOT combine app_location +
      # output_location). Point app_location at the built browser folder.
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # Angular 19 application builder emits to <outputPath>/browser.
          # outputPath in angular.json is 'dist/fe.photo-gallery'.
          app_location: 'FE.PhotoGallery/dist/fe.photo-gallery/browser'
          output_location: ''
          skip_app_build: true
          skip_api_build: true
