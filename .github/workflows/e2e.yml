name: E2E Tests

on:
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: keycloak
          POSTGRES_PASSWORD: keycloak-password
          POSTGRES_DB: keycloak
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin-password
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 9000:9000
          - 9001:9001
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'FE.PhotoGallery/package-lock.json'
    
    - name: Install frontend dependencies
      run: cd FE.PhotoGallery && npm ci
    
    - name: Install Playwright browsers
      run: cd FE.PhotoGallery && npx playwright install --with-deps
    
    - name: Build backend
      run: dotnet build ./PhotoGallery/PhotoGallery.csproj -c Release
    
    - name: Build frontend
      run: cd FE.PhotoGallery && npm run build
    
    - name: Start backend
      run: |
        cd PhotoGallery
        nohup dotnet run --configuration Release &
        sleep 5
      env:
        ASPNETCORE_ENVIRONMENT: Testing
        ASPNETCORE_HTTP_PORTS: 5105
        DISABLE_AUTH: "true"
        Storage__Provider: "Minio"
        Storage__Minio__Endpoint: "localhost:9000"
        Storage__Minio__AccessKey: "minioadmin"
        Storage__Minio__SecretKey: "minioadmin-password"
        Storage__Minio__UseSSL: "false"
    
    - name: Start frontend (dev server)
      run: |
        cd FE.PhotoGallery
        npm start &
        sleep 10
    
    - name: Run Playwright tests
      run: cd FE.PhotoGallery && npm run e2e
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: FE.PhotoGallery/playwright-report/
    
    - name: Upload test videos
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-videos
        path: FE.PhotoGallery/test-results/
